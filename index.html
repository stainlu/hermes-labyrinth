<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes Labyrinth</title>
  <meta name="description" content="Static demo harness for the Hermes Labyrinth dashboard plugin.">
  <link rel="stylesheet" href="dashboard/dist/labyrinth.css?v=47353c7cb668">
  <style>
    html,
    body,
    #root {
      height: 100%;
      margin: 0;
    }

    body {
      background: #0e0d0a;
      color: #ece7d6;
      overflow: hidden;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .boot {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #0e0d0a;
      color: #b3ad99;
      font: 12px/1.5 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 20;
    }

    .boot-error {
      position: fixed;
      right: 16px;
      bottom: 16px;
      left: 16px;
      z-index: 30;
      max-height: 45vh;
      overflow: auto;
      border: 1px solid #8a2f1f;
      background: #26130f;
      color: #f3b1a7;
      padding: 12px 14px;
      font: 12px/1.5 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="boot" class="boot">Loading Hermes Labyrinth</div>

  <script>
    (function () {
      function showError(error) {
        var message = error && error.stack ? error.stack : String(error || "Unknown boot error");
        var boot = document.getElementById("boot");
        if (boot) boot.textContent = "Demo failed to boot";
        var box = document.getElementById("boot-error");
        if (!box) {
          box = document.createElement("pre");
          box.id = "boot-error";
          box.className = "boot-error";
          document.body.appendChild(box);
        }
        box.textContent = message;
      }

      window.__HERMES_LABYRINTH_DEMO__ = true;
      window.__HERMES_BOOT_ERROR__ = showError;
      window.__HERMES_PLUGINS__ = {
        pages: new Map(),
        slots: new Map(),
        register: function (name, component) {
          this.pages.set(name, component);
        },
        registerSlot: function (plugin, slot, component) {
          if (!this.slots.has(slot)) this.slots.set(slot, []);
          this.slots.get(slot).push({ plugin: plugin, component: component });
        }
      };

      window.addEventListener("error", function (event) {
        showError(event.error || event.message);
      });
      window.addEventListener("unhandledrejection", function (event) {
        showError(event.reason);
      });
    })();
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script>
    window.__HERMES_PLUGIN_SDK__ = { React: window.React };
  </script>
  <script src="dashboard/dist/index.js?v=47353c7cb668"></script>
  <script>
    (function () {
      try {
        if (!window.React || !window.ReactDOM) throw new Error("React failed to load.");
        var App = window.__HERMES_PLUGINS__.pages.get("hermes-labyrinth");
        if (!App) throw new Error("Hermes Labyrinth plugin did not register.");
        var boot = document.getElementById("boot");
        if (boot) boot.remove();
        window.ReactDOM.createRoot(document.getElementById("root")).render(
          window.React.createElement(App)
        );
      } catch (error) {
        window.__HERMES_BOOT_ERROR__(error);
      }
    })();
  </script>
</body>
</html>
