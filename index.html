          useState: React.useState,
          useEffect: React.useEffect,
          useCallback: React.useCallback,
          useMemo: React.useMemo,
          useRef: React.useRef,
          useContext: React.useContext,
          createContext: React.createContext
        },
        fetchJSON: function (url) {
          return Promise.resolve(payloadFor(url));
        },
        components: {},
        utils: {}
      };

      const nativeFetch = window.fetch.bind(window);
      window.fetch = function (input, init) {
        const url = typeof input === "string" ? input : input.url;
        if (String(url).indexOf(API_BASE) >= 0) {
          const payload = payloadFor(url);
          const isText = typeof payload === "string";
          return Promise.resolve(new Response(isText ? payload : JSON.stringify(payload), {
            status: 200,
            headers: { "content-type": isText ? "text/plain" : "application/json" }
          }));
        }
        return nativeFetch(input, init);
      };

      window.__HERMES_PLUGINS__ = {
        register: function (name, Component) {
          if (name !== "hermes-labyrinth") return;
          ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(Component));
        },
        registerSlot: function () {}
      };
    })();
  </script>
  <script src="./dashboard/dist/index.js"></script>
</body>
</html>
