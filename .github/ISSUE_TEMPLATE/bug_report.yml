name: Bug report
description: Report a reproducible problem in Hermes Labyrinth.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Exact steps to reproduce the issue.
      placeholder: |
        1. Install plugin
        2. Open Labyrinth tab
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or Commit
      placeholder: v0.1.0 or commit SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Hermes Agent version, browser, OS, dashboard logs.
