name: hermes-labyrinth
label: Hermes Labyrinth
description: Editorial ink-and-paper dashboard theme for the Hermes Labyrinth extension.

# The plugin owns its detailed chrome. This theme makes the surrounding Hermes
# dashboard sit closer to the handoff: paper/ink structure, compact density,
# graphite thread accent, and restrained gold threshold color.

layoutVariant: standard

palette:
  background: "#0e0d0a"
  midground: "#ece7d6"
  foreground:
    hex: "#c8d4e8"
    alpha: 0.08
  warmGlow: "rgba(201, 168, 87, 0.16)"
  noiseOpacity: 0.7

layout:
  radius: "0.25rem"
  density: compact

typography:
  fontSans: "Inter, ui-sans-serif, system-ui, sans-serif"
  fontMono: "JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
  fontDisplay: "Newsreader, Georgia, serif"
  baseSize: "14px"
  lineHeight: "1.5"
  letterSpacing: "0"
